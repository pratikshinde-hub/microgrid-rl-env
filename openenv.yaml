name: microgrid-rl-env
version: "1.0.0"

description: >
  A real-world microgrid energy management environment.
  The agent controls battery dispatch and flexible load curtailment
  to minimize cost, avoid blackouts, and maximize renewable utilization.

api_base: "https://anirudhpatil-microgrid-rl-env.hf.space"

endpoints:
  reset:
    methods: [GET, POST]
    path: /reset

  step:
    methods: [GET, POST]
    path: /step

  state:
    method: GET
    path: /state/{session_id}

  tasks:
    method: GET
    path: /tasks

  grader:
    methods: [GET, POST]
    path: /grader

  baseline:
    methods: [GET, POST]
    path: /baseline

  baseline_run:
    method: GET
    path: /baseline_run

  health:
    method: GET
    path: /health

tasks:
  - id: sunny_day
    difficulty: easy
    steps: 96
    description: Stable solar generation and demand

  - id: volatile_market
    difficulty: medium
    steps: 96
    description: Highly volatile electricity prices

  - id: islanded_crisis
    difficulty: hard
    steps: 96
    description: Grid outage scenario with tight constraints

action_space:
  type: object
  properties:
    battery_kw:
      type: float
      min: -10.0
      max: 10.0
      description: Battery charge (+) / discharge (-)

    curtail_fraction:
      type: float
      min: 0.0
      max: 1.0
      description: Fraction of flexible load deferred

observation_space:
  type: object
  properties:
    solar_kw: float
    solar_forecast_kw: float
    soc: float
    battery_capacity_kwh: float
    base_load_kw: float
    flexible_load_kw: float
    deferred_kwh: float
    grid_available: boolean
    spot_price: float
    price_forecast: float
    step: integer
    total_steps: integer

reward:
  type: dense
  description: >
    Composite reward balancing cost minimization, blackout avoidance,
    renewable utilization, deferred load penalties, and battery constraints.

grader:
  output_range: [0.0, 1.0]
  deterministic: true
  components:
    - cost_efficiency
    - blackout_avoidance
    - solar_utilization
    - load_clearance
    - battery_health

deterministic: true